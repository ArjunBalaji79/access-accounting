# Country configurations for Access Accounting pilot
# Sources: World Bank ICP 2024, BIS AI Diffusion IFR (90 FR 4544)
#
# PPP factors: World Bank "Price level ratio of PPP conversion factor (GDP) to
# market exchange rate" (indicator PA.NUS.PPPC.RF). USA = 1.0 baseline.
# https://data.worldbank.org/indicator/PA.NUS.PPPC.RF
#
# VERIFICATION (2026-04-30):
# Values below were reconciled against the World Bank v2 API.
# Run `python -m src.verify_data --config data/` to reproduce.
# `data_verified_date` records the last operator-confirmed reconciliation.
#
# BIS tiers: From Supplement No. 2 to Part 740 of the EAR,
# per 90 FR 4544 (Jan 15, 2025). Note: IFR was rescinded May 2025;
# tiers are used as a historical design case.
#
# GDP per capita: World Bank WDI, current USD, most recent year
# https://data.worldbank.org/indicator/NY.GDP.PCAP.CD
#
# DATA SOVEREIGNTY (README_06):
# `data_sovereignty_class` records the most restrictive cross-border data
# transfer regime applicable in the jurisdiction. Values:
#   none                    — no federal data localization or transfer law
#   cross_border_restricted — transfer permitted with conditions (SCCs,
#                             adequacy, consent)
#   localization_required   — certain data categories must be stored /
#                             processed in-country
#   transfer_prohibited     — cross-border transfer of covered data is
#                             prohibited outright
# This field is *descriptive* in AAR-Core and does NOT modify the ECA
# score — the binding constraint depends on workload data type (public
# text vs. patient records) which is outside the schema's scope.

# === TIER 1 COUNTRIES ===

- name: United States
  iso_alpha3: USA
  bis_tier: 1
  tpp_cap: null  # No cap for Tier 1
  ppp_factor: 1.0  # Reference country (by construction PPP/FCRF = 1.0)
  gdp_per_capita_usd: 84534  # World Bank NY.GDP.PCAP.CD 2024
  rd_spend_per_researcher_usd: 406000  # UNESCO UIS, verify manually
  data_verified_date: "2026-04-30"
  data_sovereignty_class: "none"
  data_sovereignty_source: "No federal data localization law; sectoral rules (HIPAA, FERPA, CJIS) apply to specific data types but impose no blanket cross-border restriction"
  notes: "Reference country for PPP normalization"

- name: Germany
  iso_alpha3: DEU
  bis_tier: 1
  tpp_cap: null
  ppp_factor: 0.76  # World Bank PA.NUS.PPP / PA.NUS.FCRF 2024 = 0.7586
  gdp_per_capita_usd: 56104  # World Bank NY.GDP.PCAP.CD 2024
  rd_spend_per_researcher_usd: 290000
  data_verified_date: "2026-04-30"
  data_sovereignty_class: "cross_border_restricted"
  data_sovereignty_source: "GDPR Art. 46-49; transfers outside EU/EEA require adequacy decision, SCCs, or BCRs; Schrems II (C-311/18) invalidated Privacy Shield for US transfers"
  notes: "EU member; Frankfurt AWS/GCP/Azure region"

- name: Japan
  iso_alpha3: JPN
  bis_tier: 1
  tpp_cap: null
  # PA.NUS.PPP(JP) 2024 = 94.4626 ¥/intl$ ; PA.NUS.FCRF(JP) 2024 = 151.3663 ¥/US$
  # price-level ratio = 94.4626 / 151.3663 = 0.6241 → rounded to 0.62.
  # 2025 PPP is published at 95.0003 but 2025 FCRF is not; applying 2024 FCRF
  # gives 0.6276 — a 0.6% shift that rounds to the same 0.62.
  ppp_factor: 0.62
  gdp_per_capita_usd: 32487  # World Bank NY.GDP.PCAP.CD 2024
  rd_spend_per_researcher_usd: 175000
  data_verified_date: "2026-04-30"
  data_sovereignty_class: "cross_border_restricted"
  data_sovereignty_source: "APPI Art. 28; cross-border transfer requires consent or an equivalent-protection finding; Japan has an EU adequacy decision (2019, reviewed 2023)"
  notes: "Tokyo AWS/GCP region; interesting PPP case due to sustained yen weakness"

- name: United Kingdom
  iso_alpha3: GBR
  bis_tier: 1
  tpp_cap: null
  # PA.NUS.PPP(GB) 2024 = 0.6642 £/intl$ ; PA.NUS.FCRF(GB) 2024 = 0.7824 £/US$
  # price-level ratio = 0.6642 / 0.7824 = 0.8489 → rounded to 0.85.
  # 2025 PPP = 0.6698 with 2024 FCRF gives 0.8561 (<1% shift).
  ppp_factor: 0.85
  gdp_per_capita_usd: 53246  # World Bank NY.GDP.PCAP.CD 2024
  rd_spend_per_researcher_usd: 270000
  data_verified_date: "2026-04-30"
  data_sovereignty_class: "cross_border_restricted"
  data_sovereignty_source: "UK GDPR Art. 46-49; post-Brexit EU adequacy decision (2021, renewed 2025); similar transfer mechanism requirements to GDPR"
  notes: "London AWS/GCP/Azure region"

