# Country configurations for Access Accounting pilot
# Sources: World Bank ICP 2024, BIS AI Diffusion IFR (90 FR 4544)
#
# PPP factors: World Bank "PPP conversion factor, GDP (LCU per international $)"
# https://data.worldbank.org/indicator/PA.NUS.PPPC.RF
# Values here are illustrative based on ICP 2024 reporting.
# VERIFY against the live World Bank data portal before publication.
#
# BIS tiers: From Supplement No. 2 to Part 740 of the EAR,
# per 90 FR 4544 (Jan 15, 2025). Note: IFR was rescinded May 2025;
# tiers are used as a historical design case.
#
# GDP per capita: World Bank WDI, current USD, most recent year
# https://data.worldbank.org/indicator/NY.GDP.PCAP.CD

# === TIER 1 COUNTRIES ===

- name: United States
  iso_alpha3: USA
  bis_tier: 1
  tpp_cap: null  # No cap for Tier 1
  ppp_factor: 1.0  # Reference country
  gdp_per_capita_usd: 80035
  rd_spend_per_researcher_usd: 406000  # UNESCO UIS, verify
  notes: "Reference country for PPP normalization"

- name: Germany
  iso_alpha3: DEU
  bis_tier: 1
  tpp_cap: null
  ppp_factor: 0.78  # ICP 2024 illustrative
