# ============================================================
# Azure
# ============================================================
# Prices pulled from the Azure Retail Prices API (the authoritative
# public pricing endpoint) on 2026-04-30:
#   https://prices.azure.com/api/retail/prices
#
# Per-GPU rates are instance price ÷ 8 (both SKUs ship 8 GPUs).
# `reserved_usd_per_gpu_hr` uses the **1-Year Savings Plan** rate where
# Azure publishes one — this is the closest analogue to AWS's 1-year
# Reserved Instance field and GCP's 1-year committed-use rate. Regions
# where Azure does not publish a 1-Year SP leave the field null, matching
# the AWS / GCP null-pattern rather than synthesising a number.
# `spot_usd_per_gpu_hr` uses Azure Spot (the GA-equivalent of the older
# "Low Priority" tier), not Low Priority.

# --- H100 SXM5 (Standard_ND96isr_H100_v5 = 8x H100 80GB SXM5) ---

- provider: azure
  gpu_class: H100_SXM5
  instance_type: Standard_ND96isr_H100_v5
  gpus_per_instance: 8
  pricing_type: on_demand
  regions:
    - region_code: eastus
      region_country_iso: USA
      on_demand_usd_per_gpu_hr: 12.290
      reserved_usd_per_gpu_hr: null  # 1-Year SP not published for H100 v5
      spot_usd_per_gpu_hr: 2.271
      availability_class: GA
    - region_code: westus3
      region_country_iso: USA  # secondary USA region (parity with AWS us-east/us-west pair)
      on_demand_usd_per_gpu_hr: 12.290
      reserved_usd_per_gpu_hr: null
      spot_usd_per_gpu_hr: 2.271
      availability_class: GA
    - region_code: westeurope
      region_country_iso: NLD  # Netherlands — serves DEU / NGA fallback
      on_demand_usd_per_gpu_hr: 16.529
      reserved_usd_per_gpu_hr: null
      spot_usd_per_gpu_hr: 2.953
      availability_class: GA
    - region_code: uksouth
      region_country_iso: GBR
      on_demand_usd_per_gpu_hr: 15.915
      reserved_usd_per_gpu_hr: null
      spot_usd_per_gpu_hr: 2.839
      availability_class: GA
    - region_code: japaneast
      region_country_iso: JPN
      on_demand_usd_per_gpu_hr: 18.373
      reserved_usd_per_gpu_hr: null
      spot_usd_per_gpu_hr: 3.293
      availability_class: GA
    - region_code: uaenorth
      region_country_iso: ARE
      on_demand_usd_per_gpu_hr: 18.127
      reserved_usd_per_gpu_hr: null
      spot_usd_per_gpu_hr: 3.248
      availability_class: GA
  pricing_url: "https://azure.microsoft.com/en-us/pricing/details/virtual-machines/linux/"
  pricing_retrieval_date: "2026-04-30"

