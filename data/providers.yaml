# Cloud provider pricing and regional availability
# Sources: AWS/GCP/Azure public pricing pages
#
# IMPORTANT: All prices are per-GPU-hour, derived by dividing
# instance price by GPUs per instance.
#
# Pricing retrieval: These are illustrative values based on Q1 2026
# public pricing pages. VERIFY all values before publication.
# Record the exact URL and date you accessed each price.
#
# Availability class:
#   GA = Generally Available (can provision on-demand)
#   Limited = Available but capacity-constrained
#   Waitlisted = Must request access / join waitlist
#   Unavailable = Not offered in this region

# ============================================================
# AWS
# ============================================================

# --- H100 SXM5 (p5.48xlarge = 8x H100) ---
# Source: https://aws.amazon.com/ec2/capacityblocks/pricing/

- provider: aws
  gpu_class: H100_SXM5
  instance_type: p5.48xlarge
  gpus_per_instance: 8
  regions:
    - region_code: us-east-1
      region_country_iso: USA
      on_demand_usd_per_gpu_hr: 3.933
      reserved_usd_per_gpu_hr: null  # Capacity Blocks only
      spot_usd_per_gpu_hr: null
      availability_class: GA
