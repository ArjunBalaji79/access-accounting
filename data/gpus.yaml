# GPU specifications for ECA computation
# Source: NVIDIA official datasheets
#
# CRITICAL CONVENTION (from paper):
# All FLOP/s values are DENSE BF16, SXM form factor, NO SPARSITY.
# Sparsity is recorded for reference but excluded from ECA.
# Cite exact datasheet column used.
#
# VERIFICATION NOTE (2026-04-30):
# NVIDIA's H100 product brief lists "1,979 TFLOP/s" for the BF16 Tensor Core
# row. The datasheet footnote reads:
#   "Shown with sparsity. Specifications one-half lower without sparsity."
# Dense BF16 (no sparsity) = 989.5 TFLOP/s. This is the value the ECA
# framework uses throughout — consistent with the paper convention of "dense
# BF16, SXM, no sparsity" to prevent gaming across chip generations whose
# sparsity support differs.
# Source: https://resources.nvidia.com/en-us-gpu-resources/h100-datasheet-24306
#
# For the A100 there is no comparable ambiguity — the datasheet's BF16 Tensor
# Core dense value is 312 TFLOP/s (624 with sparsity).

- name: H100_SXM5
  full_name: "NVIDIA H100 SXM5 80GB"
  form_factor: SXM
  memory_gb: 80
  memory_type: HBM3
  # Dense BF16 peak: 989.5 TFLOP/s — used in ECA (no sparsity).
  peak_tflops_bf16_dense: 989.5
  # Sparse BF16 peak: 1979 TFLOP/s — recorded for reference, NOT used in ECA.
  peak_tflops_bf16_sparse: 1979.0
  tdp_watts: 700
  datasheet_url: "https://www.nvidia.com/en-us/data-center/h100/"
  notes: "Used in AWS p5, GCP a3-highgpu instances"

- name: A100_SXM4
  full_name: "NVIDIA A100 SXM4 80GB"
  form_factor: SXM
  memory_gb: 80
  memory_type: HBM2e
  # Dense BF16 peak: 312 TFLOP/s — used in ECA (no sparsity).
  peak_tflops_bf16_dense: 312.0
  # Sparse BF16 peak: 624 TFLOP/s — recorded for reference, NOT used in ECA.
  peak_tflops_bf16_sparse: 624.0
  tdp_watts: 400
  datasheet_url: "https://www.nvidia.com/en-us/data-center/a100/"
  notes: "Used in AWS p4d, GCP a2-highgpu instances"

